<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foody Delivery App</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.food{
    background:#b8a9a9;
    padding:15px;
    margin:20px 0;
    border-radius:15px;
    text-align:center;
    color:white;
}

button{
    padding:12px 25px;
    margin-top:10px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{transform:scale(1.05);}

.add{background:#e91e63;color:white;}
.clear{background:red;color:white;}
.order{background:#25D366;color:white;}
.loc{background:#007bff;color:white;}

#cart{
    background:#fff;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

input, select{
    width:100%;
    max-width:500px;
    height:45px;
    font-size:16px;
    padding:8px;
    margin:5px 0;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>
<h1 style="font-size: 100px; font-family: Arial, sans-serif;">FOODY</h1>
<p>Fast & Smart Food Delivery</p>
</header>

<div class="container">

<h2 style="font-size: 68px; font-family: Arial, sans-serif;">Customer Details</h2>
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="address" placeholder="Address">

<h3 style="font-size: 68px; font-family: Arial, sans-serif;">Payment Method</h3>
<select id="payment" onchange="togglePayment()">
    <option value="COD">Cash on Delivery</option>
    <option value="ONLINE">Online Payment</option>
</select>

<div id="qrBox" class="hidden">
    <p><b>Pay UPI:</b> 8449196052@nyes</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=8449196052@nyes&pn=FOODY&cu=INR">
    <button onclick="markPaid()" style="background:green;color:white;">I Have Paid</button>
    <p id="paymentStatus">Payment Status: ❌ Not Paid</p>
</div>

<input id="location" placeholder="GPS Location" readonly>
<button class="loc" onclick="getLocation()">📍 Get Location</button>

<h2>🍔 Menu</h2>

<div class="food">
<h3>Pizza ₹99</h3>
<button class="add" onclick="add('Pizza',99)">Add</button>
</div>

<div class="food">
<h3>Burger ₹49</h3>
<button class="add" onclick="add('Burger',49)">Add</button>
</div>

<div class="food">
<h3>Sandwich ₹59</h3>
<button class="add" onclick="add('Sandwich',59)">Add</button>
</div>

<div class="food">
<h3>Samosa ₹15</h3>
<button class="add" onclick="add('Samosa',15)">Add</button>
</div>

<div id="cart">
<h2>🛒 Cart</h2>

<ul id="list"></ul>

<p>Food Total: ₹<span id="total">0</span></p>
<p>Delivery: ₹<span id="delivery">30</span></p>
<p><b>Grand Total: ₹<span id="grandTotal">0</span></b></p>

<p><b>Minimum Order ₹120 Required</b></p>

<button class="clear" onclick="clearCart()">Clear Cart</button>
<button class="order" onclick="order()">Order on WhatsApp</button>
</div>

</div>

<audio id="successSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>

let cart = [];
let total = 0;
let isPaid = false;

const DELIVERY_CHARGE = 30;

function add(name, price){
    cart.push({name, price});
    total += price;

    let li = document.createElement("li");
    li.innerText = name + " ₹" + price;
    document.getElementById("list").appendChild(li);

    updateCart();
}

function clearCart(){
    cart = [];
    total = 0;
    document.getElementById("list").innerHTML = "";
    updateCart();
}

function updateCart(){

    document.getElementById("total").innerText = total;
    document.getElementById("delivery").innerText = DELIVERY_CHARGE;
    document.getElementById("grandTotal").innerText = total + DELIVERY_CHARGE;
}

function getLocation(){
    navigator.geolocation.getCurrentPosition(pos=>{
        document.getElementById("location").value =
        "https://maps.google.com/?q=" + pos.coords.latitude + "," + pos.coords.longitude;
    });
}

function togglePayment(){
    let method = document.getElementById("payment").value;

    document.getElementById("qrBox").style.display =
        method === "ONLINE" ? "block" : "none";

    isPaid = (method === "COD");
    updatePaymentUI();
}

function updatePaymentUI(){
    document.getElementById("paymentStatus").innerText =
        "Payment Status: " + (isPaid ? "✅ Success" : "❌ Not Paid");
}

function markPaid(){
    isPaid = true;
    updatePaymentUI();

    document.getElementById("successSound").play();

    confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.6 }
    });

    alert("Payment Successful ✔");
}

function order(){

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let address = document.getElementById("address").value;
    let location = document.getElementById("location").value;
    let payment = document.getElementById("payment").value;

    if(!name || !mobile || !address){
        alert("Fill all details");
        return;
    }

    if(cart.length === 0){
        alert("Cart empty");
        return;
    }

    if(total < 120){
        alert("Minimum order ₹120 required");
        return;
    }

    if(payment === "ONLINE" && !isPaid){
        alert("Please complete payment first!");
        return;
    }

    let grand = total + DELIVERY_CHARGE;

    let itemsText = cart.map(i => i.name + " - ₹" + i.price).join("\n");

    let msg =
`🍔 FOODY ORDER

Name: ${name}
Mobile: ${mobile}
Address: ${address}
Payment: ${payment}
Location: ${location}

Items:
${itemsText}

Total: ₹${total}
Delivery: ₹${DELIVERY_CHARGE}
Grand: ₹${grand}`;

    window.open("https://wa.me/8449196052?text=" + encodeURIComponent(msg), "_blank");
}

</script>

</body>
</html>
